<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Heart</title>

<style>
    body{
        margin:0;
        background:black;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        position:relative;
        width:500px;
        height:500px;
    }

    .word{
        position:absolute;
        color:#ff9ecf;
        font-size:18px;
        font-family:Arial;
        text-shadow:0 0 10px #fff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow{
        from{
            transform:scale(1);
        }
        to{
            transform:scale(1.1);
        }
    }
</style>
</head>
<body>

<div class="container" id="heart"></div>

<script>
const heart = document.getElementById("heart");

for(let t = 0; t < Math.PI * 2; t += 0.05){

    // Fórmula del corazón
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t)
          - 5 * Math.cos(2 * t)
          - 2 * Math.cos(3 * t)
          - Math.cos(4 * t);

    // Escala y posición
    let posX = x * 15 + 250;
    let posY = -y * 15 + 250;

    const span = document.createElement("span");
    span.className = "word";
    span.innerText = "love you";

    span.style.left = posX + "px";
    span.style.top = posY + "px";

    heart.appendChild(span);
}
</script>

</body>
</html>
